name: Sync Airtable CSVs

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  workflow_dispatch:       # Manual trigger from GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Opt in now; remove after June 2nd

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4          # v4 tag already updated to node24 runtime

      - name: Set up Python
        uses: actions/setup-python@v6      # v6 is the node24 upgrade (breaking from v5)
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Airtable CSVs
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
        run: python scripts/fetch_airtable_csv.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.csv
          git diff --staged --quiet || (
            git commit -m "chore(data): auto-sync Airtable CSVs [skip ci]" &&
            git push
          )

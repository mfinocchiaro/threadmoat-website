<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1b3a"/>
      <stop offset="100%" stop-color="#2a2344"/>
    </linearGradient>
    <linearGradient id="stripe" x1="80" y1="100" x2="432" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <clipPath id="roundedRect">
      <rect width="512" height="512" rx="96" ry="96"/>
    </clipPath>
  </defs>
  <g clip-path="url(#roundedRect)">
    <!-- Background -->
    <rect width="512" height="512" fill="url(#bg)"/>
    <!-- T letter -->
    <rect x="96" y="110" width="320" height="56" rx="8" fill="white"/>
    <rect x="204" y="110" width="104" height="296" rx="8" fill="white"/>
    <!-- Diagonal gradient stripe (the ThreadMoat slash) -->
    <line x1="72" y1="80" x2="440" y2="300" stroke="url(#stripe)" stroke-width="36" stroke-linecap="round"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80">
  <defs>
    <clipPath id="ibm-text">
      <!-- I -->
      <rect x="0" y="0" width="30" height="80"/>
      <!-- B -->
      <path d="M50,0 h35 a20,20 0 0 1 0,36 h-35 z M50,44 h35 a20,20 0 0 1 0,36 h-35 z"/>
      <!-- M -->
      <polygon points="110,0 130,0 145,30 160,0 180,0 180,80 160,80 160,25 145,55 130,25 130,80 110,80"/>
    </clipPath>
  </defs>
  <!-- 8 horizontal stripes clipped to IBM letters -->
  <g clip-path="url(#ibm-text)">
    <rect x="0" y="0" width="180" height="7" fill="#1F70C1"/>
    <rect x="0" y="10" width="180" height="7" fill="#1F70C1"/>
    <rect x="0" y="20" width="180" height="7" fill="#1F70C1"/>
    <rect x="0" y="30" width="180" height="7" fill="#1F70C1"/>
    <rect x="0" y="40" width="180" height="7" fill="#1F70C1"/>
    <rect x="0" y="50" width="180" height="7" fill="#1F70C1"/>
    <rect x="0" y="60" width="180" height="7" fill="#1F70C1"/>
    <rect x="0" y="70" width="180" height="7" fill="#1F70C1"/>
  </g>
</svg>
